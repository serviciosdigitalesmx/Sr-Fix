<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1F7EDC">
    <title>SRFIX - Integrador Interno</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./pwa-mobile.css">
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #2b2b2b;
            --text: #f2f2f2;
            --muted: #8a8f95;
            --blue: #1f7edc;
            --orange: #ff6a2a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .bar {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--blue);
            background: #161616;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .left { display: flex; align-items: center; gap: 8px; }
        .logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #fff;
            padding: 4px;
            object-fit: contain;
        }
        .title { font-weight: 700; letter-spacing: .3px; }
        .tabs { display: flex; gap: 8px; }
        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .tab {
            border: 1px solid var(--blue);
            background: var(--panel);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab.active {
            background: var(--orange);
            border-color: var(--orange);
        }
        .wrap { height: calc(100vh - 62px); }
        .panel {
            display: none;
            height: 100%;
        }
        .panel.active {
            display: block;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: var(--bg);
        }
        .fallback {
            padding: 8px 16px;
            color: var(--muted);
            font-size: 12px;
        }
        .fallback a { color: var(--blue); }
        .branch-select {
            background: #1a1a1a;
            border: 1px solid var(--blue);
            color: var(--text);
            border-radius: 10px;
            padding: 8px 12px;
            min-width: 180px;
        }
        .login-screen {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 16px;
        }
        .login-card {
            width: 100%;
            max-width: 360px;
            background: var(--panel);
            border: 1px solid var(--blue);
            border-radius: 14px;
            padding: 22px;
        }
        .login-card h2 {
            margin: 0 0 6px 0;
            color: var(--blue);
            font-size: 22px;
        }
        .login-card p {
            margin: 0 0 14px 0;
            color: var(--muted);
            font-size: 13px;
        }
        .login-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--blue);
            color: var(--text);
            border-radius: 10px;
            padding: 12px;
            outline: none;
            margin-bottom: 10px;
        }
        .login-btn {
            width: 100%;
            border: 1px solid var(--orange);
            background: var(--orange);
            color: #fff;
            font-weight: 700;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
        }
        .login-error {
            color: #ef4444;
            font-size: 13px;
            min-height: 18px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <h2>Acceso interno</h2>
            <p>Ingresa una sola vez para Operativo, Técnico y Solicitudes</p>
            <input id="master-password" class="login-input" type="password" placeholder="Contraseña" autocomplete="current-password">
            <button id="master-login-btn" class="login-btn" type="button">Entrar</button>
            <div id="master-error" class="login-error"></div>
        </div>
    </div>

    <header class="bar">
        <div class="left">
            <img src="./logo.webp" alt="SRFIX" class="logo" onerror="this.src='./logo.png'">
            <div class="title">SRFIX Integrador Interno</div>
        </div>
        <div class="controls">
        <select id="selector-sucursal" class="branch-select">
            <option value="GLOBAL">Todas las sucursales</option>
        </select>
        <nav class="tabs">
            <button id="tab-operativo" class="tab" type="button">Operativo</button>
            <button id="tab-tecnico" class="tab" type="button">Técnico</button>
            <button id="tab-solicitudes" class="tab" type="button">Solicitudes</button>
            <button id="tab-archivo" class="tab" type="button">Archivo</button>
            <button id="tab-clientes" class="tab" type="button">Clientes</button>
            <button id="tab-tareas" class="tab" type="button">Tareas</button>
            <button id="tab-stock" class="tab" type="button">Stock</button>
            <button id="tab-proveedores" class="tab" type="button">Proveedores</button>
            <button id="tab-compras" class="tab" type="button">Compras</button>
            <button id="tab-gastos" class="tab" type="button">Gastos</button>
            <button id="tab-finanzas" class="tab" type="button">Finanzas</button>
            <button id="tab-reportes" class="tab" type="button">Reportes</button>
            <button id="tab-sucursales" class="tab" type="button">Sucursales</button>
        </nav>
        </div>
    </header>
    <div class="wrap">
        <section id="panel-operativo" class="panel" aria-label="Módulo Operativo">
            <iframe id="frame-operativo" title="Modulo Operativo" src="about:blank"></iframe>
        </section>
        <section id="panel-tecnico" class="panel" aria-label="Módulo Técnico">
            <iframe id="frame-tecnico" title="Modulo Técnico" src="about:blank"></iframe>
        </section>
        <section id="panel-solicitudes" class="panel" aria-label="Módulo Solicitudes">
            <iframe id="frame-solicitudes" title="Modulo Solicitudes" src="about:blank"></iframe>
        </section>
        <section id="panel-archivo" class="panel" aria-label="Módulo Archivo">
            <iframe id="frame-archivo" title="Modulo Archivo" src="about:blank"></iframe>
        </section>
        <section id="panel-clientes" class="panel" aria-label="Módulo Clientes">
            <iframe id="frame-clientes" title="Modulo Clientes" src="about:blank"></iframe>
        </section>
        <section id="panel-tareas" class="panel" aria-label="Módulo Tareas">
            <iframe id="frame-tareas" title="Modulo Tareas" src="about:blank"></iframe>
        </section>
        <section id="panel-stock" class="panel" aria-label="Módulo Stock">
            <iframe id="frame-stock" title="Modulo Stock" src="about:blank"></iframe>
        </section>
        <section id="panel-proveedores" class="panel" aria-label="Módulo Proveedores">
            <iframe id="frame-proveedores" title="Modulo Proveedores" src="about:blank"></iframe>
        </section>
        <section id="panel-compras" class="panel" aria-label="Módulo Compras">
            <iframe id="frame-compras" title="Modulo Compras" src="about:blank"></iframe>
        </section>
        <section id="panel-gastos" class="panel" aria-label="Módulo Gastos">
            <iframe id="frame-gastos" title="Modulo Gastos" src="about:blank"></iframe>
        </section>
        <section id="panel-finanzas" class="panel" aria-label="Módulo Finanzas">
            <iframe id="frame-finanzas" title="Modulo Finanzas" src="about:blank"></iframe>
        </section>
        <section id="panel-reportes" class="panel" aria-label="Módulo Reportes">
            <iframe id="frame-reportes" title="Modulo Reportes" src="about:blank"></iframe>
        </section>
        <section id="panel-sucursales" class="panel" aria-label="Módulo Sucursales">
            <iframe id="frame-sucursales" title="Modulo Sucursales" src="about:blank"></iframe>
        </section>
    </div>
    <div class="fallback">
        Si algo falla: <a href="./panel-operativo.html" target="_blank">Operativo</a> |
        <a href="./panel-tecnico.html" target="_blank">Técnico</a> |
        <a href="./panel-solicitudes.html" target="_blank">Solicitudes</a> |
        <a href="./panel-archivo.html" target="_blank">Archivo</a> |
        <a href="./panel-clientes.html" target="_blank">Clientes</a> |
        <a href="./panel-tareas.html" target="_blank">Tareas</a> |
        <a href="./panel-stock.html" target="_blank">Stock</a> |
        <a href="./panel-proveedores.html" target="_blank">Proveedores</a> |
        <a href="./panel-compras.html" target="_blank">Compras</a> |
        <a href="./panel-gastos.html" target="_blank">Gastos</a> |
        <a href="./panel-finanzas.html" target="_blank">Finanzas</a> |
        <a href="./panel-reportes.html" target="_blank">Reportes</a> |
        <a href="./panel-sucursales.html" target="_blank">Sucursales</a>
    </div>

    <script>
        const PANEL_OP = document.getElementById('panel-operativo');
        const PANEL_TE = document.getElementById('panel-tecnico');
        const PANEL_SO = document.getElementById('panel-solicitudes');
        const PANEL_AR = document.getElementById('panel-archivo');
        const PANEL_CL = document.getElementById('panel-clientes');
        const PANEL_TA = document.getElementById('panel-tareas');
        const PANEL_ST = document.getElementById('panel-stock');
        const PANEL_PR = document.getElementById('panel-proveedores');
        const PANEL_CO = document.getElementById('panel-compras');
        const PANEL_GA = document.getElementById('panel-gastos');
        const PANEL_FI = document.getElementById('panel-finanzas');
        const PANEL_RE = document.getElementById('panel-reportes');
        const PANEL_SU = document.getElementById('panel-sucursales');
        const BTN_OP = document.getElementById('tab-operativo');
        const BTN_TE = document.getElementById('tab-tecnico');
        const BTN_SO = document.getElementById('tab-solicitudes');
        const BTN_AR = document.getElementById('tab-archivo');
        const BTN_CL = document.getElementById('tab-clientes');
        const BTN_TA = document.getElementById('tab-tareas');
        const BTN_ST = document.getElementById('tab-stock');
        const BTN_PR = document.getElementById('tab-proveedores');
        const BTN_CO = document.getElementById('tab-compras');
        const BTN_GA = document.getElementById('tab-gastos');
        const BTN_FI = document.getElementById('tab-finanzas');
        const BTN_RE = document.getElementById('tab-reportes');
        const BTN_SU = document.getElementById('tab-sucursales');
        const FRAME_OP = document.getElementById('frame-operativo');
        const FRAME_TE = document.getElementById('frame-tecnico');
        const FRAME_SO = document.getElementById('frame-solicitudes');
        const FRAME_AR = document.getElementById('frame-archivo');
        const FRAME_CL = document.getElementById('frame-clientes');
        const FRAME_TA = document.getElementById('frame-tareas');
        const FRAME_ST = document.getElementById('frame-stock');
        const FRAME_PR = document.getElementById('frame-proveedores');
        const FRAME_CO = document.getElementById('frame-compras');
        const FRAME_GA = document.getElementById('frame-gastos');
        const FRAME_FI = document.getElementById('frame-finanzas');
        const FRAME_RE = document.getElementById('frame-reportes');
        const FRAME_SU = document.getElementById('frame-sucursales');
        const SELECTOR_SUCURSAL = document.getElementById('selector-sucursal');
        const LOGIN_SCREEN = document.getElementById('login-screen');
        const MASTER_INPUT = document.getElementById('master-password');
        const MASTER_BTN = document.getElementById('master-login-btn');
        const MASTER_ERROR = document.getElementById('master-error');
        const MASTER_PASS = 'Admin1';
        const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxH1zD8_14TvCajstFhtEpLNODwG9GZXkLoCXOb1IBNm0JIRmpCwS6SRsuGhZETK88z/exec';
        const FRAME_SRC = {
            operativo: './panel-operativo.html',
            tecnico: './panel-tecnico.html',
            solicitudes: './panel-solicitudes.html',
            archivo: './panel-archivo.html',
            clientes: './panel-clientes.html',
            tareas: './panel-tareas.html',
            stock: './panel-stock.html',
            proveedores: './panel-proveedores.html',
            compras: './panel-compras.html',
            gastos: './panel-gastos.html',
            finanzas: './panel-finanzas.html',
            reportes: './panel-reportes.html',
            sucursales: './panel-sucursales.html'
        };

        function asegurarCargaIframe(modulo) {
            if (modulo === 'operativo' && FRAME_OP.src === 'about:blank') {
                FRAME_OP.src = FRAME_SRC.operativo;
            }
            if (modulo === 'tecnico' && FRAME_TE.src === 'about:blank') {
                FRAME_TE.src = FRAME_SRC.tecnico;
            }
            if (modulo === 'solicitudes' && FRAME_SO.src === 'about:blank') {
                FRAME_SO.src = FRAME_SRC.solicitudes;
            }
            if (modulo === 'archivo' && FRAME_AR.src === 'about:blank') {
                FRAME_AR.src = FRAME_SRC.archivo;
            }
            if (modulo === 'clientes' && FRAME_CL.src === 'about:blank') {
                FRAME_CL.src = FRAME_SRC.clientes;
            }
            if (modulo === 'tareas' && FRAME_TA.src === 'about:blank') {
                FRAME_TA.src = FRAME_SRC.tareas;
            }
            if (modulo === 'stock' && FRAME_ST.src === 'about:blank') {
                FRAME_ST.src = FRAME_SRC.stock;
            }
            if (modulo === 'proveedores' && FRAME_PR.src === 'about:blank') {
                FRAME_PR.src = FRAME_SRC.proveedores;
            }
            if (modulo === 'compras' && FRAME_CO.src === 'about:blank') {
                FRAME_CO.src = FRAME_SRC.compras;
            }
            if (modulo === 'gastos' && FRAME_GA.src === 'about:blank') {
                FRAME_GA.src = FRAME_SRC.gastos;
            }
            if (modulo === 'finanzas' && FRAME_FI.src === 'about:blank') {
                FRAME_FI.src = FRAME_SRC.finanzas;
            }
            if (modulo === 'reportes' && FRAME_RE.src === 'about:blank') {
                FRAME_RE.src = FRAME_SRC.reportes;
            }
            if (modulo === 'sucursales' && FRAME_SU.src === 'about:blank') {
                FRAME_SU.src = FRAME_SRC.sucursales;
            }
        }

        function mostrarModulo(modulo) {
            const actual = ['operativo', 'tecnico', 'solicitudes', 'archivo', 'tareas', 'stock', 'proveedores', 'compras', 'gastos', 'finanzas'].includes(modulo) ? modulo : 'operativo';
            asegurarCargaIframe(actual);
            PANEL_OP.classList.toggle('active', actual === 'operativo');
            PANEL_TE.classList.toggle('active', actual === 'tecnico');
            PANEL_SO.classList.toggle('active', actual === 'solicitudes');
            PANEL_AR.classList.toggle('active', actual === 'archivo');
            PANEL_CL.classList.toggle('active', actual === 'clientes');
            PANEL_TA.classList.toggle('active', actual === 'tareas');
            PANEL_ST.classList.toggle('active', actual === 'stock');
            PANEL_PR.classList.toggle('active', actual === 'proveedores');
            PANEL_CO.classList.toggle('active', actual === 'compras');
            PANEL_GA.classList.toggle('active', actual === 'gastos');
            PANEL_FI.classList.toggle('active', actual === 'finanzas');
            PANEL_RE.classList.toggle('active', actual === 'reportes');
            PANEL_SU.classList.toggle('active', actual === 'sucursales');
            BTN_OP.classList.toggle('active', actual === 'operativo');
            BTN_TE.classList.toggle('active', actual === 'tecnico');
            BTN_SO.classList.toggle('active', actual === 'solicitudes');
            BTN_AR.classList.toggle('active', actual === 'archivo');
            BTN_CL.classList.toggle('active', actual === 'clientes');
            BTN_TA.classList.toggle('active', actual === 'tareas');
            BTN_ST.classList.toggle('active', actual === 'stock');
            BTN_PR.classList.toggle('active', actual === 'proveedores');
            BTN_CO.classList.toggle('active', actual === 'compras');
            BTN_GA.classList.toggle('active', actual === 'gastos');
            BTN_FI.classList.toggle('active', actual === 'finanzas');
            BTN_RE.classList.toggle('active', actual === 'reportes');
            BTN_SU.classList.toggle('active', actual === 'sucursales');

            const url = new URL(window.location.href);
            url.searchParams.set('modulo', actual);
            window.history.replaceState({}, '', url);
        }

        BTN_OP.addEventListener('click', () => mostrarModulo('operativo'));
        BTN_TE.addEventListener('click', () => mostrarModulo('tecnico'));
        BTN_SO.addEventListener('click', () => mostrarModulo('solicitudes'));
        BTN_AR.addEventListener('click', () => mostrarModulo('archivo'));
        BTN_CL.addEventListener('click', () => mostrarModulo('clientes'));
        BTN_TA.addEventListener('click', () => mostrarModulo('tareas'));
        BTN_ST.addEventListener('click', () => mostrarModulo('stock'));
        BTN_PR.addEventListener('click', () => mostrarModulo('proveedores'));
        BTN_CO.addEventListener('click', () => mostrarModulo('compras'));
        BTN_GA.addEventListener('click', () => mostrarModulo('gastos'));
        BTN_FI.addEventListener('click', () => mostrarModulo('finanzas'));
        BTN_RE.addEventListener('click', () => mostrarModulo('reportes'));
        BTN_SU.addEventListener('click', () => mostrarModulo('sucursales'));

        async function cargarSucursales() {
            try {
                const res = await fetch(BACKEND_URL, { method: 'POST', body: JSON.stringify({ action: 'listar_sucursales', soloActivas: '1', page: 1, pageSize: 100 }) });
                const data = await res.json();
                const actual = localStorage.getItem('srfix_sucursal_activa') || 'GLOBAL';
                SELECTOR_SUCURSAL.innerHTML = '<option value="GLOBAL">Todas las sucursales</option>';
                (data.sucursales || []).forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.ID;
                    opt.textContent = item.NOMBRE;
                    SELECTOR_SUCURSAL.appendChild(opt);
                });
                SELECTOR_SUCURSAL.value = Array.from(SELECTOR_SUCURSAL.options).some(x => x.value === actual) ? actual : 'GLOBAL';
            } catch (e) {}
        }

        SELECTOR_SUCURSAL.addEventListener('change', () => {
            localStorage.setItem('srfix_sucursal_activa', SELECTOR_SUCURSAL.value || 'GLOBAL');
            [FRAME_OP, FRAME_TE, FRAME_SO, FRAME_AR, FRAME_CL, FRAME_TA, FRAME_ST, FRAME_PR, FRAME_CO, FRAME_GA, FRAME_FI, FRAME_RE, FRAME_SU].forEach(frame => {
                if (frame && frame.src && frame.src !== 'about:blank') {
                    frame.src = frame.src;
                }
            });
        });

        function entrarIntegrador() {
            sessionStorage.setItem('srfix_pass_master', MASTER_PASS);
            sessionStorage.setItem('srfix_pass_operativo', MASTER_PASS);
            sessionStorage.setItem('srfix_pass_tecnico', MASTER_PASS);
            if (!localStorage.getItem('srfix_sucursal_activa')) {
                localStorage.setItem('srfix_sucursal_activa', 'GLOBAL');
            }
            LOGIN_SCREEN.style.display = 'none';
            cargarSucursales();
            const modulo = new URLSearchParams(window.location.search).get('modulo');
            mostrarModulo(modulo || 'operativo');
        }

        function validarMaster() {
            MASTER_ERROR.textContent = '';
            const pass = (MASTER_INPUT.value || '').trim();
            if (pass !== MASTER_PASS) {
                MASTER_ERROR.textContent = 'Contraseña incorrecta';
                return;
            }
            entrarIntegrador();
        }

        MASTER_BTN.addEventListener('click', validarMaster);
        MASTER_INPUT.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validarMaster();
        });

        if (sessionStorage.getItem('srfix_pass_master') === MASTER_PASS) {
            entrarIntegrador();
        }
    </script>
    <script src="./pwa-init.js"></script>
</body>
</html>
