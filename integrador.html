<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1F7EDC">
    <title>SRFIX - Integrador Interno</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./pwa-mobile.css">
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #2b2b2b;
            --text: #f2f2f2;
            --muted: #8a8f95;
            --blue: #1f7edc;
            --orange: #ff6a2a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
        }
        body[data-device="mobile"] {
            --app-shell-offset: 188px;
        }
        body[data-device="desktop"] {
            --app-shell-offset: 64px;
        }
        .bar {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--blue);
            background: #161616;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .left { display: flex; align-items: center; gap: 8px; }
        .logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #fff;
            padding: 4px;
            object-fit: contain;
        }
        .title { font-weight: 700; letter-spacing: .3px; }
        .tabs { display: flex; flex-direction: column; gap: 8px; }
        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .tab {
            border: 1px solid var(--blue);
            background: var(--panel);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab.active {
            background: var(--orange);
            border-color: var(--orange);
        }
        .wrap { height: calc(100vh - 62px); }
        .panel {
            display: none;
            height: 100%;
        }
        .panel.active {
            display: block;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: var(--bg);
        }
        .fallback {
            padding: 8px 16px;
            color: var(--muted);
            font-size: 12px;
        }
        .fallback a { color: var(--blue); }
        .branch-select {
            background: #1a1a1a;
            border: 1px solid var(--blue);
            color: var(--text);
            border-radius: 10px;
            padding: 8px 12px;
            min-width: 180px;
        }
        .login-screen {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 16px;
        }
        .login-card {
            width: 100%;
            max-width: 360px;
            background: var(--panel);
            border: 1px solid var(--blue);
            border-radius: 14px;
            padding: 22px;
        }
        .login-card h2 {
            margin: 0 0 6px 0;
            color: var(--blue);
            font-size: 22px;
        }
        .login-card p {
            margin: 0 0 14px 0;
            color: var(--muted);
            font-size: 13px;
        }
        .login-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--blue);
            color: var(--text);
            border-radius: 10px;
            padding: 12px;
            outline: none;
            margin-bottom: 10px;
        }
        .login-check {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 12px;
        }
        .login-btn {
            width: 100%;
            border: 1px solid var(--orange);
            background: var(--orange);
            color: #fff;
            font-weight: 700;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: transform .18s ease, opacity .18s ease, box-shadow .18s ease;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(255,106,42,.2);
        }
        .login-btn:disabled {
            opacity: .85;
            cursor: wait;
        }
        .btn-busy {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border-radius: 999px;
            border: 2px solid rgba(255,255,255,.35);
            border-top-color: #fff;
            animation: spin .8s linear infinite;
        }
        .login-card.loading {
            box-shadow: 0 0 0 1px rgba(31,126,220,.18), 0 18px 50px rgba(31,126,220,.12);
        }
        .login-card.loading .login-input {
            border-color: rgba(31,126,220,.55);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .login-error {
            color: #ef4444;
            font-size: 13px;
            min-height: 18px;
            margin-top: 8px;
        }
    
.app-layout { display: flex; min-height: calc(var(--app-vh, 1dvh) * 100 - var(--app-shell-offset, 64px)); }
.sidebar { width: 220px; background: #0f172a; padding: 12px; border-right: 1px solid rgba(255,255,255,.08); }
.wrap { flex: 1; }
.tab { width: 100%; text-align: left; }

@media (max-width: 900px) {
    .bar {
        padding: 10px 12px;
        gap: 12px;
    }

    .left {
        width: 100%;
        justify-content: center;
    }

    .title {
        font-size: 15px;
        text-align: center;
    }

    .controls {
        width: 100%;
    }

    .branch-select {
        width: 100%;
        min-width: 0;
    }

    .app-layout {
        flex-direction: column;
        min-height: calc(var(--app-vh, 1dvh) * 100 - 112px);
    }

    .sidebar {
        width: 100%;
        position: sticky;
        top: 76px;
        z-index: 4;
        padding: 10px 10px 8px;
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,.08);
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(10px);
    }

    .tabs {
        flex-direction: row;
        gap: 10px;
        width: max-content;
        min-width: 100%;
        padding-bottom: 4px;
    }

    .tab {
        width: auto;
        min-width: max-content;
        white-space: nowrap;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
    }

    .wrap {
        height: auto;
        min-height: calc(var(--app-vh, 1dvh) * 100 - 188px);
    }

    .panel {
        min-height: calc(var(--app-vh, 1dvh) * 100 - 188px);
    }

    iframe {
        min-height: calc(var(--app-vh, 1dvh) * 100 - 188px);
    }

    .fallback {
        display: none;
    }
}

@media (max-width: 560px) {
    body {
        min-height: 100dvh;
    }

    .login-screen {
        padding: 14px;
        align-items: flex-start;
        padding-top: 8vh;
    }

    .login-card {
        max-width: none;
        width: 100%;
        border-radius: 18px;
        padding: 20px 16px;
    }

    .login-card h2 {
        font-size: 20px;
    }

    .logo {
        width: 32px;
        height: 32px;
    }

    .bar {
        padding: 10px 10px calc(10px + env(safe-area-inset-top, 0px));
    }

    .title {
        font-size: 14px;
    }

    .sidebar {
        top: 90px;
        padding-left: 8px;
        padding-right: 8px;
    }

    .tab {
        font-size: 13px;
        padding: 9px 12px;
    }

    .controls {
        gap: 8px;
    }

    .branch-select {
        padding: 10px 12px;
        font-size: 14px;
    }

    .wrap,
    .panel,
    iframe {
        min-height: calc(var(--app-vh, 1dvh) * 100 - 205px);
    }
}

</style>
</head>

    <script>
        const PANEL_OP = document.getElementById('panel-operativo');
        const PANEL_TE = document.getElementById('panel-tecnico');
        const PANEL_SO = document.getElementById('panel-solicitudes');
        const PANEL_AR = document.getElementById('panel-archivo');
        const PANEL_CL = document.getElementById('panel-clientes');
        const PANEL_TA = document.getElementById('panel-tareas');
        const PANEL_ST = document.getElementById('panel-stock');
        const PANEL_PR = document.getElementById('panel-proveedores');
        const PANEL_CO = document.getElementById('panel-compras');
        const PANEL_GA = document.getElementById('panel-gastos');
        const PANEL_FI = document.getElementById('panel-finanzas');
        const PANEL_RE = document.getElementById('panel-reportes');
        const PANEL_SU = document.getElementById('panel-sucursales');
        const PANEL_SG = document.getElementById('panel-seguridad');
        const BTN_OP = document.getElementById('tab-operativo');
        const BTN_TE = document.getElementById('tab-tecnico');
        const BTN_SO = document.getElementById('tab-solicitudes');
        const BTN_AR = document.getElementById('tab-archivo');
        const BTN_CL = document.getElementById('tab-clientes');
        const BTN_TA = document.getElementById('tab-tareas');
        const BTN_ST = document.getElementById('tab-stock');
        const BTN_PR = document.getElementById('tab-proveedores');
        const BTN_CO = document.getElementById('tab-compras');
        const BTN_GA = document.getElementById('tab-gastos');
        const BTN_FI = document.getElementById('tab-finanzas');
        const BTN_RE = document.getElementById('tab-reportes');
        const BTN_SU = document.getElementById('tab-sucursales');
        const BTN_SG = document.getElementById('tab-seguridad');
        const FRAME_OP = document.getElementById('frame-operativo');
        const FRAME_TE = document.getElementById('frame-tecnico');
        const FRAME_SO = document.getElementById('frame-solicitudes');
        const FRAME_AR = document.getElementById('frame-archivo');
        const FRAME_CL = document.getElementById('frame-clientes');
        const FRAME_TA = document.getElementById('frame-tareas');
        const FRAME_ST = document.getElementById('frame-stock');
        const FRAME_PR = document.getElementById('frame-proveedores');
        const FRAME_CO = document.getElementById('frame-compras');
        const FRAME_GA = document.getElementById('frame-gastos');
        const FRAME_FI = document.getElementById('frame-finanzas');
        const FRAME_RE = document.getElementById('frame-reportes');
        const FRAME_SU = document.getElementById('frame-sucursales');
        const FRAME_SG = document.getElementById('frame-seguridad');
        const SELECTOR_SUCURSAL = document.getElementById('selector-sucursal');
        const LOGIN_SCREEN = document.getElementById('login-screen');
        const MAIN_BAR = document.getElementById('main-bar');
        const APP_LAYOUT = document.getElementById('app-layout');
        const FALLBACK_LINKS = document.getElementById('fallback-links');
        const MASTER_INPUT = document.getElementById('master-password');
        const MASTER_USER = document.getElementById('master-username');
        const MASTER_REMEMBER = document.getElementById('master-remember');
        const MASTER_BTN = document.getElementById('master-login-btn');
        const MASTER_ERROR = document.getElementById('master-error');
        const LOGIN_CARD = document.querySelector('.login-card');
        const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxH1zD8_14TvCajstFhtEpLNODwG9GZXkLoCXOb1IBNm0JIRmpCwS6SRsuGhZETK88z/exec';
        const APP_BUILD = '20260402a';
        const FRAME_SRC = {
            operativo: './panel-operativo.html',
            tecnico: './panel-tecnico.html',
            solicitudes: './panel-solicitudes.html',
            archivo: './panel-archivo.html',
            clientes: './panel-clientes.html',
            tareas: './panel-tareas.html',
            stock: './panel-stock.html',
            proveedores: './panel-proveedores.html',
            compras: './panel-compras.html',
            gastos: './panel-gastos.html',
            finanzas: './panel-finanzas.html',
            reportes: './panel-reportes.html',
            sucursales: './panel-sucursales.html',
            seguridad: './panel-seguridad.html'
        };

        function buildFrameUrl(path) {
            const url = new URL(path, window.location.href);
            url.searchParams.set('v', APP_BUILD);
            return url.toString();
        }

        function asegurarCargaIframe(modulo) {
            if (modulo === 'operativo' && FRAME_OP.src === 'about:blank') {
                FRAME_OP.src = buildFrameUrl(FRAME_SRC.operativo);
            }
            if (modulo === 'tecnico' && FRAME_TE.src === 'about:blank') {
                FRAME_TE.src = buildFrameUrl(FRAME_SRC.tecnico);
            }
            if (modulo === 'solicitudes' && FRAME_SO.src === 'about:blank') {
                FRAME_SO.src = buildFrameUrl(FRAME_SRC.solicitudes);
            }
            if (modulo === 'archivo' && FRAME_AR.src === 'about:blank') {
                FRAME_AR.src = buildFrameUrl(FRAME_SRC.archivo);
            }
            if (modulo === 'clientes' && FRAME_CL.src === 'about:blank') {
                FRAME_CL.src = buildFrameUrl(FRAME_SRC.clientes);
            }
            if (modulo === 'tareas' && FRAME_TA.src === 'about:blank') {
                FRAME_TA.src = buildFrameUrl(FRAME_SRC.tareas);
            }
            if (modulo === 'stock' && FRAME_ST.src === 'about:blank') {
                FRAME_ST.src = buildFrameUrl(FRAME_SRC.stock);
            }
            if (modulo === 'proveedores' && FRAME_PR.src === 'about:blank') {
                FRAME_PR.src = buildFrameUrl(FRAME_SRC.proveedores);
            }
            if (modulo === 'compras' && FRAME_CO.src === 'about:blank') {
                FRAME_CO.src = buildFrameUrl(FRAME_SRC.compras);
            }
            if (modulo === 'gastos' && FRAME_GA.src === 'about:blank') {
                FRAME_GA.src = buildFrameUrl(FRAME_SRC.gastos);
            }
            if (modulo === 'finanzas' && FRAME_FI.src === 'about:blank') {
                FRAME_FI.src = buildFrameUrl(FRAME_SRC.finanzas);
            }
            if (modulo === 'reportes' && FRAME_RE.src === 'about:blank') {
                FRAME_RE.src = buildFrameUrl(FRAME_SRC.reportes);
            }
            if (modulo === 'sucursales' && FRAME_SU.src === 'about:blank') {
                FRAME_SU.src = buildFrameUrl(FRAME_SRC.sucursales);
            }
            if (modulo === 'seguridad' && FRAME_SG.src === 'about:blank') {
                FRAME_SG.src = buildFrameUrl(FRAME_SRC.seguridad);
            }
        }

        function mostrarModulo(modulo) {
            const userRaw = sessionStorage.getItem('srfix_auth_user') || localStorage.getItem('srfix_auth_user');
            let current = null;
            try { current = userRaw ? JSON.parse(userRaw) : null; } catch (e) {}
            const allowed = getAllowedModules(current);
            const requested = ['operativo', 'tecnico', 'solicitudes', 'archivo', 'clientes', 'tareas', 'stock', 'proveedores', 'compras', 'gastos', 'finanzas', 'reportes', 'sucursales', 'seguridad'].includes(modulo) ? modulo : 'operativo';
            const actual = allowed.includes(requested) ? requested : 'operativo';
            asegurarCargaIframe(actual);
            PANEL_OP.classList.toggle('active', actual === 'operativo');
            PANEL_TE.classList.toggle('active', actual === 'tecnico');
            PANEL_SO.classList.toggle('active', actual === 'solicitudes');
            PANEL_AR.classList.toggle('active', actual === 'archivo');
            PANEL_CL.classList.toggle('active', actual === 'clientes');
            PANEL_TA.classList.toggle('active', actual === 'tareas');
            PANEL_ST.classList.toggle('active', actual === 'stock');
            PANEL_PR.classList.toggle('active', actual === 'proveedores');
            PANEL_CO.classList.toggle('active', actual === 'compras');
            PANEL_GA.classList.toggle('active', actual === 'gastos');
            PANEL_FI.classList.toggle('active', actual === 'finanzas');
            PANEL_RE.classList.toggle('active', actual === 'reportes');
            PANEL_SU.classList.toggle('active', actual === 'sucursales');
            PANEL_SG.classList.toggle('active', actual === 'seguridad');
            BTN_OP.classList.toggle('active', actual === 'operativo');
            BTN_TE.classList.toggle('active', actual === 'tecnico');
            BTN_SO.classList.toggle('active', actual === 'solicitudes');
            BTN_AR.classList.toggle('active', actual === 'archivo');
            BTN_CL.classList.toggle('active', actual === 'clientes');
            BTN_TA.classList.toggle('active', actual === 'tareas');
            BTN_ST.classList.toggle('active', actual === 'stock');
            BTN_PR.classList.toggle('active', actual === 'proveedores');
            BTN_CO.classList.toggle('active', actual === 'compras');
            BTN_GA.classList.toggle('active', actual === 'gastos');
            BTN_FI.classList.toggle('active', actual === 'finanzas');
            BTN_RE.classList.toggle('active', actual === 'reportes');
            BTN_SU.classList.toggle('active', actual === 'sucursales');
            BTN_SG.classList.toggle('active', actual === 'seguridad');

            const url = new URL(window.location.href);
            url.searchParams.set('modulo', actual);
            window.history.replaceState({}, '', url);
        }

        BTN_OP.addEventListener('click', () => mostrarModulo('operativo'));
        BTN_TE.addEventListener('click', () => mostrarModulo('tecnico'));
        BTN_SO.addEventListener('click', () => mostrarModulo('solicitudes'));
        BTN_AR.addEventListener('click', () => mostrarModulo('archivo'));
        BTN_CL.addEventListener('click', () => mostrarModulo('clientes'));
        BTN_TA.addEventListener('click', () => mostrarModulo('tareas'));
        BTN_ST.addEventListener('click', () => mostrarModulo('stock'));
        BTN_PR.addEventListener('click', () => mostrarModulo('proveedores'));
        BTN_CO.addEventListener('click', () => mostrarModulo('compras'));
        BTN_GA.addEventListener('click', () => mostrarModulo('gastos'));
        BTN_FI.addEventListener('click', () => mostrarModulo('finanzas'));
        BTN_RE.addEventListener('click', () => mostrarModulo('reportes'));
        BTN_SU.addEventListener('click', () => mostrarModulo('sucursales'));
        BTN_SG.addEventListener('click', () => mostrarModulo('seguridad'));

        async function cargarSucursales() {
            try {
                const res = await fetch(BACKEND_URL, { method: 'POST', body: JSON.stringify({ action: 'listar_sucursales', soloActivas: '1', page: 1, pageSize: 100 }) });
                const data = await res.json();
                const actual = localStorage.getItem('srfix_sucursal_activa') || 'GLOBAL';
                SELECTOR_SUCURSAL.innerHTML = '<option value="GLOBAL">Todas las sucursales</option>';
                (data.sucursales || []).forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.ID;
                    opt.textContent = item.NOMBRE;
                    SELECTOR_SUCURSAL.appendChild(opt);
                });
                SELECTOR_SUCURSAL.value = Array.from(SELECTOR_SUCURSAL.options).some(x => x.value === actual) ? actual : 'GLOBAL';
            } catch (e) {}
        }

        SELECTOR_SUCURSAL.addEventListener('change', () => {
            localStorage.setItem('srfix_sucursal_activa', SELECTOR_SUCURSAL.value || 'GLOBAL');
            [FRAME_OP, FRAME_TE, FRAME_SO, FRAME_AR, FRAME_CL, FRAME_TA, FRAME_ST, FRAME_PR, FRAME_CO, FRAME_GA, FRAME_FI, FRAME_RE, FRAME_SU, FRAME_SG].forEach(frame => {
                if (frame && frame.src && frame.src !== 'about:blank') {
                    const cleanPath = new URL(frame.src).pathname.split('/').pop();
                    frame.src = buildFrameUrl(`./${cleanPath}`);
                }
            });
        });

        function persistAuth(user, passwords, remember) {
            const authPayload = JSON.stringify(user || {});
            sessionStorage.setItem('srfix_auth_user', authPayload);
            sessionStorage.setItem('srfix_pass_master', 'OK');
            sessionStorage.setItem('srfix_pass_operativo', passwords.operativo);
            sessionStorage.setItem('srfix_pass_tecnico', passwords.tecnico);
            if (remember) {
                localStorage.setItem('srfix_auth_user', authPayload);
                localStorage.setItem('srfix_pass_operativo', passwords.operativo);
                localStorage.setItem('srfix_pass_tecnico', passwords.tecnico);
            } else {
                localStorage.removeItem('srfix_auth_user');
                localStorage.removeItem('srfix_pass_operativo');
                localStorage.removeItem('srfix_pass_tecnico');
            }
        }

        function resetFrames() {
            [FRAME_OP, FRAME_TE, FRAME_SO, FRAME_AR, FRAME_CL, FRAME_TA, FRAME_ST, FRAME_PR, FRAME_CO, FRAME_GA, FRAME_FI, FRAME_RE, FRAME_SU, FRAME_SG]
                .forEach(frame => {
                    if (frame) frame.src = 'about:blank';
                });
        }

        function mostrarPantallaLogin() {
            LOGIN_SCREEN.style.display = 'flex';
            MAIN_BAR.style.display = 'none';
            APP_LAYOUT.style.display = 'none';
            FALLBACK_LINKS.style.display = 'none';
        }

        function mostrarIntegrador() {
            LOGIN_SCREEN.style.display = 'none';
            MAIN_BAR.style.display = '';
            APP_LAYOUT.style.display = 'flex';
            FALLBACK_LINKS.style.display = '';
        }

        function limpiarSesionGlobal() {
            [
                'srfix_auth_user',
                'srfix_pass_master',
                'srfix_pass_operativo',
                'srfix_pass_tecnico'
            ].forEach(key => {
                sessionStorage.removeItem(key);
                localStorage.removeItem(key);
            });
        }

        function cerrarSesionGlobal() {
            limpiarSesionGlobal();
            MASTER_INPUT.value = '';
            MASTER_ERROR.textContent = '';
            resetFrames();
            aplicarRolUI(null);
            mostrarPantallaLogin();
            mostrarModulo('operativo');
        }

        function getAllowedModules(user) {
            if (!user || !user.ROL) {
                return [];
            }
            const role = String(user && user.ROL || '').toLowerCase();
            if (role === 'admin') {
                return ['operativo', 'tecnico', 'solicitudes', 'archivo', 'clientes', 'tareas', 'stock', 'proveedores', 'compras', 'gastos', 'finanzas', 'reportes', 'sucursales', 'seguridad'];
            }
            return ['operativo', 'tecnico', 'solicitudes', 'archivo', 'tareas', 'stock'];
        }

        function aplicarRolUI(user) {
            const allowed = getAllowedModules(user);
            const tabs = {
                operativo: BTN_OP,
                tecnico: BTN_TE,
                solicitudes: BTN_SO,
                archivo: BTN_AR,
                clientes: BTN_CL,
                tareas: BTN_TA,
                stock: BTN_ST,
                proveedores: BTN_PR,
                compras: BTN_CO,
                gastos: BTN_GA,
                finanzas: BTN_FI,
                reportes: BTN_RE,
                sucursales: BTN_SU,
                seguridad: BTN_SG
            };
            Object.keys(tabs).forEach(key => {
                if (!tabs[key]) return;
                tabs[key].style.display = allowed.includes(key) ? '' : 'none';
            });
            PANEL_SG.classList.toggle('active', false);
        }

        function entrarIntegrador(user, passwords) {
            const allowed = getAllowedModules(user);
            aplicarRolUI(user);
            if (!localStorage.getItem('srfix_sucursal_activa')) {
                localStorage.setItem('srfix_sucursal_activa', 'GLOBAL');
            }
            mostrarIntegrador();
            cargarSucursales();
            const modulo = new URLSearchParams(window.location.search).get('modulo');
            const solicitado = modulo || 'operativo';
            mostrarModulo(allowed.includes(solicitado) ? solicitado : 'operativo');
        }

        function setLoginLoading(isLoading, label = 'Entrar') {
            MASTER_BTN.disabled = isLoading;
            LOGIN_CARD.classList.toggle('loading', isLoading);
            MASTER_BTN.innerHTML = isLoading
                ? `<span class="btn-busy"><span class="spinner"></span><span>${label}</span></span>`
                : label;
        }

        async function validarMaster() {
            MASTER_ERROR.textContent = '';
            const usuario = (MASTER_USER.value || '').trim();
            const pass = (MASTER_INPUT.value || '').trim();
            if (!usuario || !pass) {
                MASTER_ERROR.textContent = 'Ingresa usuario y contraseña';
                return;
            }
            setLoginLoading(true, 'Ingresando...');
            try {
                const res = await fetch(BACKEND_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login_interno',
                        usuario: usuario,
                        password: pass
                    })
                });
                const data = await res.json();
                if (!res.ok || !data.success) {
                    MASTER_ERROR.textContent = (data && data.error) || 'Credenciales inválidas';
                    return;
                }
                persistAuth(data.user, data.passwords || { tecnico: pass, operativo: pass }, MASTER_REMEMBER.checked);
                entrarIntegrador(data.user, data.passwords || { tecnico: pass, operativo: pass });
            } catch (e) {
                MASTER_ERROR.textContent = 'No se pudo validar el acceso';
            } finally {
                setLoginLoading(false, 'Entrar');
            }
        }

        MASTER_BTN.addEventListener('click', validarMaster);
        MASTER_USER.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validarMaster();
        });
        MASTER_INPUT.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validarMaster();
        });

        function aplicarPerfilDispositivo() {
            const isMobile = window.matchMedia('(max-width: 900px)').matches
                || window.matchMedia('(pointer: coarse)').matches;
            document.body.setAttribute('data-device', isMobile ? 'mobile' : 'desktop');
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--app-vh', `${vh}px`);
        }

        window.addEventListener('message', (event) => {
            const data = event && event.data;
            if (!data || typeof data !== 'object') return;
            if (data.type === 'srfix:logout') {
                cerrarSesionGlobal();
            }
        });

        aplicarPerfilDispositivo();
        window.addEventListener('resize', aplicarPerfilDispositivo);
        window.addEventListener('orientationchange', aplicarPerfilDispositivo);
        mostrarPantallaLogin();

        try {
            const raw = sessionStorage.getItem('srfix_auth_user') || localStorage.getItem('srfix_auth_user');
            const passOperativo = sessionStorage.getItem('srfix_pass_operativo') || localStorage.getItem('srfix_pass_operativo');
            const passTecnico = sessionStorage.getItem('srfix_pass_tecnico') || localStorage.getItem('srfix_pass_tecnico');
            if (raw && passOperativo && passTecnico) {
                sessionStorage.setItem('srfix_auth_user', raw);
                sessionStorage.setItem('srfix_pass_operativo', passOperativo);
                sessionStorage.setItem('srfix_pass_tecnico', passTecnico);
                MASTER_REMEMBER.checked = !!localStorage.getItem('srfix_auth_user');
                entrarIntegrador(JSON.parse(raw), {
                    operativo: passOperativo,
                    tecnico: passTecnico
                });
            }
        } catch (e) {}

        try {
            const remembered = localStorage.getItem('srfix_auth_user');
            if (remembered) {
                const user = JSON.parse(remembered);
                MASTER_USER.value = user.USUARIO || '';
                MASTER_REMEMBER.checked = true;
            }
        }
        catch (e) {}
    </script>
    <script src="./pwa-init.js"></script>
</body>
</html>
