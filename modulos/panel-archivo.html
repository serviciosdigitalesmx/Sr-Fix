<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRFIX - Archivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#1E1E1E] text-[#F2F2F2]">
    <header class="border-b border-[#1F7EDC] bg-[#161616] sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
            <h1 class="text-xl font-bold text-[#1F7EDC] flex items-center gap-2">
                <i class="fa-solid fa-box-archive"></i> Archivo General
            </h1>
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-2 w-full md:w-auto">
                <select id="filtro-tipo" class="bg-[#2B2B2B] border border-[#1F7EDC]/40 rounded-lg px-3 py-2 text-sm">
                    <option value="todos">Todos</option>
                    <option value="solicitudes">Solicitudes archivadas</option>
                    <option value="cotizaciones">Cotizaciones archivadas</option>
                    <option value="equipos">Equipos entregados</option>
                </select>
                <input id="filtro-from" type="date" class="bg-[#2B2B2B] border border-[#1F7EDC]/40 rounded-lg px-3 py-2 text-sm">
                <input id="filtro-to" type="date" class="bg-[#2B2B2B] border border-[#1F7EDC]/40 rounded-lg px-3 py-2 text-sm">
                <button id="btn-refresh" class="px-3 py-2 rounded-lg border border-[#1F7EDC] hover:bg-[#1F7EDC]/20 text-sm">
                    <i class="fa-solid fa-rotate-right"></i> Filtrar
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="mb-4 text-sm text-[#8A8F95] flex flex-wrap items-center gap-3">
            <span>Registros: <span id="count" class="text-[#1F7EDC] font-bold">0</span></span>
            <span id="page-info" class="text-xs text-[#8A8F95]"></span>
        </div>

        <div id="loading" class="text-center py-10 text-[#8A8F95]">
            <i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Cargando archivo...
        </div>
        <div id="empty" class="hidden text-center py-10 text-[#8A8F95]">
            No hay registros archivados con esos filtros.
        </div>

        <div class="overflow-x-auto border border-[#1F7EDC]/30 rounded-xl bg-[#2B2B2B]">
            <table class="w-full text-sm min-w-[900px]">
                <thead class="bg-[#161616] text-[#8A8F95] uppercase text-xs">
                    <tr>
                        <th class="text-left px-3 py-3">Tipo</th>
                        <th class="text-left px-3 py-3">Fecha</th>
                        <th class="text-left px-3 py-3">Folio</th>
                        <th class="text-left px-3 py-3">Cliente</th>
                        <th class="text-left px-3 py-3">Teléfono</th>
                        <th class="text-left px-3 py-3">Detalle</th>
                        <th class="text-right px-3 py-3">Total</th>
                    </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
        </div>
        <div class="mt-4 flex justify-center">
            <button id="btn-more" class="hidden px-4 py-2 rounded-lg border border-[#1F7EDC] hover:bg-[#1F7EDC]/20 text-sm">
                <i class="fa-solid fa-angles-down"></i> Cargar más
            </button>
        </div>
    </main>

    <script src="./panel-archivo.js"></script>
</body>
</html>
