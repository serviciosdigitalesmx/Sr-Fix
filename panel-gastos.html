<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRFIX - Gastos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#1E1E1E] text-[#F2F2F2]">
    <header class="border-b border-[#1F7EDC] bg-[#161616] sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-xl font-bold text-[#1F7EDC] flex items-center gap-2">
                    <i class="fa-solid fa-wallet"></i> Gastos
                </h1>
                <p class="text-sm text-[#8A8F95]">Registra egresos operativos y consulta su resumen por periodo.</p>
            </div>
            <div class="flex gap-2">
                <button id="btn-refresh" class="px-3 py-2 rounded-lg border border-[#1F7EDC] hover:bg-[#1F7EDC]/20 text-sm">
                    <i class="fa-solid fa-rotate-right"></i> Actualizar
                </button>
                <button id="btn-nuevo" class="px-3 py-2 rounded-lg bg-[#FF6A2A] hover:bg-[#ff7d46] text-white text-sm font-semibold">
                    <i class="fa-solid fa-plus"></i> Nuevo gasto
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-[#1F7EDC]/10 border border-[#1F7EDC]/30 rounded-xl p-4">
                <div id="kpi-total" class="text-3xl font-bold text-[#8cc4ff]">$0.00</div>
                <div class="text-xs uppercase tracking-wide text-[#9dcfff]">Total del periodo</div>
            </div>
            <div class="bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-4">
                <div id="kpi-fijos" class="text-3xl font-bold text-yellow-400">$0.00</div>
                <div class="text-xs uppercase tracking-wide text-yellow-300">Gastos fijos</div>
            </div>
            <div class="bg-orange-500/10 border border-orange-500/30 rounded-xl p-4">
                <div id="kpi-variables" class="text-3xl font-bold text-orange-300">$0.00</div>
                <div class="text-xs uppercase tracking-wide text-orange-200">Gastos variables</div>
            </div>
        </section>

        <section class="bg-[#2B2B2B] border border-[#1F7EDC]/30 rounded-xl p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-3">
                <input id="filtro-desde" type="date" class="bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
                <input id="filtro-hasta" type="date" class="bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
                <select id="filtro-tipo" class="bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
                    <option value="">Todos los tipos</option>
                    <option value="fijo">Fijo</option>
                    <option value="variable">Variable</option>
                </select>
                <select id="filtro-categoria" class="bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
                    <option value="">Todas las categorías</option>
                    <option value="renta">Renta</option>
                    <option value="nómina">Nómina</option>
                    <option value="servicios">Servicios</option>
                    <option value="herramientas">Herramientas</option>
                    <option value="insumos">Insumos</option>
                    <option value="refacciones">Refacciones</option>
                    <option value="paquetería">Paquetería</option>
                    <option value="marketing">Marketing</option>
                    <option value="transporte">Transporte</option>
                    <option value="otros">Otros</option>
                </select>
                <input id="filtro-texto" type="text" placeholder="Buscar por concepto o proveedor" class="bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
            </div>
        </section>

        <section class="bg-[#2B2B2B] border border-[#1F7EDC]/30 rounded-xl p-4 mb-6">
            <h2 class="text-sm uppercase tracking-wide text-[#8A8F95] mb-3">Resumen mensual</h2>
            <div id="resumen-mensual" class="space-y-2 text-sm text-[#F2F2F2]"></div>
        </section>

        <section>
            <div id="loading" class="text-center py-10 text-[#8A8F95]">
                <i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Cargando gastos...
            </div>
            <div id="empty" class="hidden text-center py-10 text-[#8A8F95]">
                No hay gastos con esos filtros.
            </div>
            <div class="overflow-x-auto border border-[#1F7EDC]/30 rounded-xl bg-[#2B2B2B]">
                <table class="w-full text-sm min-w-[1200px]">
                    <thead class="bg-[#161616] text-[#8A8F95] uppercase text-xs">
                        <tr>
                            <th class="text-left px-3 py-3">Fecha</th>
                            <th class="text-left px-3 py-3">Tipo</th>
                            <th class="text-left px-3 py-3">Categoría</th>
                            <th class="text-left px-3 py-3">Concepto</th>
                            <th class="text-left px-3 py-3">Proveedor</th>
                            <th class="text-left px-3 py-3">Folio</th>
                            <th class="text-left px-3 py-3">Método</th>
                            <th class="text-right px-3 py-3">Monto</th>
                            <th class="text-left px-3 py-3">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="rows"></tbody>
                </table>
            </div>
            <div class="mt-4 flex justify-center">
                <button id="btn-more" class="hidden px-4 py-2 rounded-lg border border-[#1F7EDC] hover:bg-[#1F7EDC]/20 text-sm">
                    <i class="fa-solid fa-angles-down"></i> Cargar más
                </button>
            </div>
        </section>
    </main>

    <div id="modal-gasto" class="hidden fixed inset-0 bg-black/70 z-20 p-4 flex items-center justify-center">
        <div class="w-full max-w-4xl bg-[#2B2B2B] border border-[#1F7EDC]/40 rounded-2xl p-5 max-h-[92vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 id="gasto-title" class="text-lg font-bold text-[#1F7EDC]">Nuevo gasto</h2>
                <button data-close class="text-[#8A8F95] hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="form-gasto" class="space-y-4">
                <input id="gasto-id" type="hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div><label class="text-xs text-[#8A8F95] uppercase">Fecha</label><input id="gasto-fecha" type="date" required class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"></div>
                    <div><label class="text-xs text-[#8A8F95] uppercase">Tipo</label><select id="gasto-tipo" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"><option value="fijo">Fijo</option><option value="variable">Variable</option></select></div>
                    <div><label class="text-xs text-[#8A8F95] uppercase">Categoría</label><select id="gasto-categoria" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"><option value="renta">Renta</option><option value="nómina">Nómina</option><option value="servicios">Servicios</option><option value="herramientas">Herramientas</option><option value="insumos">Insumos</option><option value="refacciones">Refacciones</option><option value="paquetería">Paquetería</option><option value="marketing">Marketing</option><option value="transporte">Transporte</option><option value="otros">Otros</option></select></div>
                    <div><label class="text-xs text-[#8A8F95] uppercase">Concepto</label><input id="gasto-concepto" type="text" required class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"></div>
                    <div><label class="text-xs text-[#8A8F95] uppercase">Monto</label><input id="gasto-monto" type="number" min="0" step="0.01" required class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"></div>
                    <div><label class="text-xs text-[#8A8F95] uppercase">Método de pago</label><input id="gasto-metodo" type="text" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"></div>
                    <div><label class="text-xs text-[#8A8F95] uppercase">Proveedor</label><input id="gasto-proveedor" type="text" list="proveedores-lista" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"></div>
                    <datalist id="proveedores-lista"></datalist>
                    <div><label class="text-xs text-[#8A8F95] uppercase">Folio relacionado</label><input id="gasto-folio" type="text" list="folios-relacion-lista" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm uppercase"></div>
                    <datalist id="folios-relacion-lista"></datalist>
                    <div><label class="text-xs text-[#8A8F95] uppercase">Comprobante URL</label><input id="gasto-comprobante" type="text" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"></div>
                    <div class="md:col-span-3"><label class="text-xs text-[#8A8F95] uppercase">Descripción</label><textarea id="gasto-descripcion" rows="3" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"></textarea></div>
                    <div class="md:col-span-3"><label class="text-xs text-[#8A8F95] uppercase">Notas</label><textarea id="gasto-notas" rows="3" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"></textarea></div>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" data-close class="flex-1 px-3 py-2 rounded-lg border border-[#1F7EDC] hover:bg-[#1F7EDC]/20 text-sm">Cancelar</button>
                    <button type="submit" class="flex-1 px-3 py-2 rounded-lg bg-[#FF6A2A] hover:bg-[#ff7d46] text-white text-sm font-semibold">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="config.js?v=2026.04.19.1"></script>
    <script src="js/security-guard.js?v=2026.04.21.2"></script>
    <script src="js/panel-gastos.js?v=2026.04.21.1"></script>
</body>
</html>
