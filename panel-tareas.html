<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRFIX - Tareas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#1E1E1E] text-[#F2F2F2]">
    <header class="border-b border-[#1F7EDC] bg-[#161616] sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-xl font-bold text-[#1F7EDC] flex items-center gap-2">
                    <i class="fa-solid fa-list-check"></i> Tareas
                </h1>
                <p class="text-sm text-[#8A8F95]">Organiza pendientes internos, seguimientos y trabajo relacionado con folios.</p>
            </div>
            <div class="flex gap-2">
                <button id="btn-refresh" class="px-3 py-2 rounded-lg border border-[#1F7EDC] hover:bg-[#1F7EDC]/20 text-sm">
                    <i class="fa-solid fa-rotate-right"></i> Actualizar
                </button>
                <button id="btn-nueva" class="px-3 py-2 rounded-lg bg-[#FF6A2A] hover:bg-[#ff7d46] text-white text-sm font-semibold">
                    <i class="fa-solid fa-plus"></i> Nueva tarea
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-4">
                <div class="text-3xl font-bold text-yellow-400" id="kpi-pendientes">0</div>
                <div class="text-xs uppercase tracking-wide text-yellow-300">Pendientes / En proceso</div>
            </div>
            <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4">
                <div class="text-3xl font-bold text-red-400" id="kpi-urgentes">0</div>
                <div class="text-xs uppercase tracking-wide text-red-300">Urgentes</div>
            </div>
            <div class="bg-green-500/10 border border-green-500/30 rounded-xl p-4">
                <div class="text-3xl font-bold text-green-400" id="kpi-completadas">0</div>
                <div class="text-xs uppercase tracking-wide text-green-300">Completadas</div>
            </div>
        </section>

        <section class="bg-[#2B2B2B] border border-[#1F7EDC]/30 rounded-xl p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-6 gap-3">
                <input id="filtro-texto" type="text" placeholder="Buscar por folio, título o responsable" class="xl:col-span-2 bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
                <select id="filtro-estado" class="bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
                    <option value="">Todos los estados</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="en_proceso">En proceso</option>
                    <option value="completada">Completada</option>
                    <option value="cancelada">Cancelada</option>
                </select>
                <select id="filtro-prioridad" class="bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
                    <option value="">Todas las prioridades</option>
                    <option value="baja">Baja</option>
                    <option value="media">Media</option>
                    <option value="alta">Alta</option>
                    <option value="urgente">Urgente</option>
                </select>
                <select id="filtro-tipo-relacion" class="bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
                    <option value="">Todos los tipos</option>
                    <option value="general">General</option>
                    <option value="equipo">Equipo</option>
                    <option value="solicitud">Solicitud</option>
                </select>
                <input id="filtro-responsable" type="text" list="responsables-lista" placeholder="Responsable" class="bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
                <datalist id="responsables-lista"></datalist>
                <input id="filtro-desde" type="date" class="bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
                <input id="filtro-hasta" type="date" class="bg-[#161616] border border-[#1F7EDC]/30 rounded-lg px-3 py-2 text-sm">
                <button id="btn-limpiar" class="px-3 py-2 rounded-lg border border-[#1F7EDC] hover:bg-[#1F7EDC]/20 text-sm">
                    <i class="fa-solid fa-eraser"></i> Limpiar
                </button>
            </div>
        </section>

        <section>
            <div id="loading" class="text-center py-10 text-[#8A8F95]">
                <i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Cargando tareas...
            </div>
            <div id="empty" class="hidden text-center py-10 text-[#8A8F95]">
                No hay tareas con esos filtros.
            </div>
            <div id="grid" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4"></div>
            <div class="mt-5 flex justify-center">
                <button id="btn-more" class="hidden px-4 py-2 rounded-lg border border-[#1F7EDC] hover:bg-[#1F7EDC]/20 text-sm">
                    <i class="fa-solid fa-angles-down"></i> Cargar más
                </button>
            </div>
        </section>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black/70 z-20 p-4 flex items-center justify-center">
        <div class="w-full max-w-2xl bg-[#2B2B2B] border border-[#1F7EDC]/40 rounded-2xl p-5 max-h-[92vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 id="modal-title" class="text-lg font-bold text-[#1F7EDC]">Nueva tarea</h2>
                <button id="btn-cerrar-modal" class="text-[#8A8F95] hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="form-tarea" class="space-y-4">
                <input id="tarea-folio" type="hidden">
                <div>
                    <label class="text-xs text-[#8A8F95] uppercase">Título</label>
                    <input id="tarea-titulo" type="text" required class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-xs text-[#8A8F95] uppercase">Descripción</label>
                    <textarea id="tarea-descripcion" rows="3" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs text-[#8A8F95] uppercase">Estado</label>
                        <select id="tarea-estado" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm">
                            <option value="pendiente">Pendiente</option>
                            <option value="en_proceso">En proceso</option>
                            <option value="completada">Completada</option>
                            <option value="cancelada">Cancelada</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-[#8A8F95] uppercase">Prioridad</label>
                        <select id="tarea-prioridad" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm">
                            <option value="baja">Baja</option>
                            <option value="media" selected>Media</option>
                            <option value="alta">Alta</option>
                            <option value="urgente">Urgente</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs text-[#8A8F95] uppercase">Responsable</label>
                        <input id="tarea-responsable" type="text" list="responsables-lista" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm">
                    </div>
                    <div>
                        <label class="text-xs text-[#8A8F95] uppercase">Fecha límite</label>
                        <input id="tarea-fecha-limite" type="date" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs text-[#8A8F95] uppercase">Tipo de relación</label>
                        <select id="tarea-tipo-relacion" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm">
                            <option value="general">General</option>
                            <option value="equipo">Equipo</option>
                            <option value="solicitud">Solicitud</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-[#8A8F95] uppercase">Folio relacionado</label>
                        <input id="tarea-folio-relacionado" type="text" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm uppercase">
                    </div>
                </div>
                <div>
                    <label class="text-xs text-[#8A8F95] uppercase">Notas internas</label>
                    <textarea id="tarea-notas" rows="4" class="mt-1 w-full rounded-lg bg-[#161616] border border-[#1F7EDC]/30 px-3 py-2 text-sm"></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" id="btn-cancelar" class="flex-1 px-3 py-2 rounded-lg border border-[#1F7EDC] hover:bg-[#1F7EDC]/20 text-sm">Cancelar</button>
                    <button type="submit" id="btn-guardar" class="flex-1 px-3 py-2 rounded-lg bg-[#FF6A2A] hover:bg-[#ff7d46] text-white text-sm font-semibold">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./panel-tareas.js"></script>
</body>
</html>
