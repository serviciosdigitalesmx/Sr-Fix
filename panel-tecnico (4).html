<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRFIX - Panel Técnico Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body {
            background-color: #1E1E1E;
            color: #F2F2F2;
            background-image: radial-gradient(circle at 10% 20%, rgba(31, 126, 220, 0.05) 0%, transparent 30%);
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .animate-pulse-red { animation: pulse-red 2s infinite; }

        .card-rojo {
            background: #2B2B2B;
            border-left: 4px solid #ef4444;
            border: 1px solid #1F7EDC;
            box-shadow: 0 4px 12px rgba(31, 126, 220, 0.2);
        }
        .card-amarillo {
            background: #2B2B2B;
            border-left: 4px solid #eab308;
            border: 1px solid #1F7EDC;
            box-shadow: 0 4px 12px rgba(31, 126, 220, 0.2);
        }
        .card-verde {
            background: #2B2B2B;
            border-left: 4px solid #22c55e;
            border: 1px solid #1F7EDC;
            box-shadow: 0 4px 12px rgba(31, 126, 220, 0.2);
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1E1E1E; }
        ::-webkit-scrollbar-thumb { background: #1F7EDC; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #FF6A2A; }

        .spinner {
            border: 3px solid rgba(31, 126, 220, 0.2);
            border-radius: 50%;
            border-top-color: #1F7EDC;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .badge-estado {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-recibido { background-color: #1F7EDC20; color: #1F7EDC; border: 1px solid #1F7EDC; }
        .badge-diagnostico { background-color: #1F7EDC20; color: #1F7EDC; border: 1px solid #1F7EDC; }
        .badge-reparacion { background-color: #FF6A2A20; color: #FF6A2A; border: 1px solid #FF6A2A; }
        .badge-esperando { background-color: #FF6A2A20; color: #FF6A2A; border: 1px solid #FF6A2A; }
        .badge-listo { background-color: #22c55e20; color: #22c55e; border: 1px solid #22c55e; }
        .badge-entregado { background-color: #8A8F9520; color: #8A8F95; border: 1px solid #8A8F95; }

        .btn-naranja {
            background-color: #FF6A2A;
            color: #F2F2F2;
            transition: all 0.2s;
        }
        .btn-naranja:hover {
            background-color: #E85A1F;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 106, 42, 0.5);
        }

        .btn-azul {
            background-color: #1F7EDC;
            color: #F2F2F2;
        }
        .btn-azul:hover {
            background-color: #1a6ab8;
        }

        .input-tech {
            background-color: #2B2B2B;
            border: 2px solid #1F7EDC;
            color: #F2F2F2;
        }
        .input-tech:focus {
            border-color: #FF6A2A;
            outline: none;
        }

        .text-metal {
            color: #8A8F95;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- CONFIGURACIÓN -->
    <script>
        const CONFIG = {
            BACKEND_URL: 'https://script.google.com/macros/s/AKfycbxssOhbCiIGpibvlCn8b7QAEFvub9gh5h2U_BmbvwKhH304NEivpRtkEI8LBQYOeCws/exec',
            MODULO: 'tecnico',
            LOGO_URL: 'https://raw.githubusercontent.com/jesusvilla091921-create/chavez-app-suite/main/logo.png'
        };
    </script>

    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 bg-[#1E1E1E] flex items-center justify-center z-50 p-4">
        <div class="w-full max-w-sm">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-[#1F7EDC] rounded-full flex items-center justify-center mx-auto mb-4 text-white text-3xl shadow-lg overflow-hidden">
                    <img src="https://raw.githubusercontent.com/jesusvilla091921-create/chavez-app-suite/main/logo.png" 
                         alt="SrFix" 
                         class="w-full h-full object-cover"
                         onerror="this.onerror=null; this.src=''; this.parentNode.innerHTML='<i class=\'fa-solid fa-screwdriver-wrench\'></i>'">
                </div>
                <h1 class="text-3xl font-bold text-[#1F7EDC]">SR<span class="text-[#1F7EDC]">FIX</span></h1>
                <p class="text-[#8A8F95] mt-2">Panel Técnico Profesional</p>
            </div>

            <div class="bg-[#2B2B2B] rounded-2xl p-6 border border-[#1F7EDC] shadow-xl">
                <label class="block text-sm text-[#8A8F95] mb-2">Contraseña de acceso</label>
                <input type="password" id="password-input" placeholder="••••••" 
                       class="w-full bg-[#1E1E1E] border border-[#1F7EDC] rounded-xl p-4 text-white text-center text-lg tracking-widest focus:border-[#FF6A2A] focus:outline-none mb-4"
                       onkeypress="if(event.key==='Enter') login()">
                <button onclick="login()" id="btn-login" class="btn-naranja w-full font-bold py-4 rounded-xl transition-colors flex items-center justify-center gap-2">
                    <span>INGRESAR</span>
                </button>
                <p id="login-error" class="text-red-500 text-sm text-center mt-3 hidden"></p>
                <p class="text-xs text-[#8A8F95] text-center mt-4">Versión 3.0 · Profesional</p>
            </div>
        </div>
    </div>

    <!-- APLICACIÓN PRINCIPAL -->
    <div id="app" class="hidden min-h-screen flex flex-col">
        <!-- Barra superior con LOGO -->
        <nav class="bg-[#1E1E1E] border-b border-[#1F7EDC] p-4 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#1F7EDC] rounded-lg flex items-center justify-center text-white font-bold overflow-hidden">
                        <img src="https://raw.githubusercontent.com/jesusvilla091921-create/chavez-app-suite/main/logo.png" 
                             alt="SrFix" 
                             class="w-full h-full object-cover"
                             onerror="this.onerror=null; this.src=''; this.parentNode.innerHTML='<i class=\'fa-solid fa-microchip\'></i>'">
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-[#1F7EDC]">SR<span class="text-[#1F7EDC]">FIX</span></h1>
                        <p class="text-xs text-[#8A8F95]">Panel Técnico · <span id="fecha-actual"></span></p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="refrescarManual()" id="btn-refresh" class="text-[#8A8F95] hover:text-[#F2F2F2] text-sm flex items-center gap-1 px-3 py-2 rounded-lg hover:bg-[#2B2B2B]">
                        <i class="fa-solid fa-rotate-right"></i> <span class="hidden sm:inline">Actualizar</span>
                    </button>
                    <button onclick="logout()" class="text-[#8A8F95] hover:text-[#F2F2F2] text-sm flex items-center gap-1 px-3 py-2 rounded-lg hover:bg-[#2B2B2B]">
                        <i class="fa-solid fa-right-from-bracket"></i> <span class="hidden sm:inline">Salir</span>
                    </button>
                </div>
            </div>
        </nav>

        <main class="p-4 md:p-6 max-w-7xl mx-auto w-full">
            <!-- KPIs (mantienen la paleta) -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4 flex items-center justify-between">
                    <div>
                        <div class="text-3xl font-bold text-red-500" id="count-urgentes">-</div>
                        <div class="text-xs text-red-400 uppercase font-semibold">Críticos (≤2 días)</div>
                    </div>
                    <i class="fa-solid fa-circle-exclamation text-red-500 text-3xl opacity-50"></i>
                </div>
                <div class="bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-4 flex items-center justify-between">
                    <div>
                        <div class="text-3xl font-bold text-yellow-500" id="count-atencion">-</div>
                        <div class="text-xs text-yellow-400 uppercase font-semibold">Atención (3-4 días)</div>
                    </div>
                    <i class="fa-solid fa-clock text-yellow-500 text-3xl opacity-50"></i>
                </div>
                <div class="bg-green-500/10 border border-green-500/30 rounded-xl p-4 flex items-center justify-between">
                    <div>
                        <div class="text-3xl font-bold text-green-500" id="count-tiempo">-</div>
                        <div class="text-xs text-green-400 uppercase font-semibold">A tiempo (≥5 días)</div>
                    </div>
                    <i class="fa-solid fa-check-circle text-green-500 text-3xl opacity-50"></i>
                </div>
                <div class="bg-[#1F7EDC]/10 border border-[#1F7EDC]/30 rounded-xl p-4 flex items-center justify-between">
                    <div>
                        <div class="text-3xl font-bold text-[#1F7EDC]" id="count-total">-</div>
                        <div class="text-xs text-[#1F7EDC] uppercase font-semibold">Total en taller</div>
                    </div>
                    <i class="fa-solid fa-cubes text-[#1F7EDC] text-3xl opacity-50"></i>
                </div>
            </div>

            <!-- Barra de búsqueda y filtros -->
            <div class="bg-[#2B2B2B] rounded-xl p-4 border border-[#1F7EDC] mb-6">
                <div class="flex flex-col md:flex-row gap-4 items-center">
                    <div class="relative flex-1 w-full">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-[#8A8F95]"></i>
                        <input type="text" id="buscador" placeholder="Buscar por folio, cliente o equipo..." 
                               class="w-full bg-[#1E1E1E] border border-[#1F7EDC] rounded-lg py-2.5 pl-10 pr-4 text-[#F2F2F2] focus:border-[#FF6A2A] outline-none">
                    </div>
                    <select id="filtro-color" class="bg-[#1E1E1E] border border-[#1F7EDC] rounded-lg py-2.5 px-4 text-[#F2F2F2] focus:border-[#FF6A2A] outline-none">
                        <option value="todos">Todos los colores</option>
                        <option value="rojo">🔴 Urgente</option>
                        <option value="amarillo">🟡 Atención</option>
                        <option value="verde">🟢 A tiempo</option>
                    </select>
                    <select id="filtro-estado" class="bg-[#1E1E1E] border border-[#1F7EDC] rounded-lg py-2.5 px-4 text-[#F2F2F2] focus:border-[#FF6A2A] outline-none">
                        <option value="todos">Todos los estados</option>
                        <option value="Recibido">📦 Recibido</option>
                        <option value="En Diagnóstico">🔍 En Diagnóstico</option>
                        <option value="En Reparación">🔧 En Reparación</option>
                        <option value="Esperando Refacción">⏳ Esperando Refacción</option>
                        <option value="Listo">✅ Listo</option>
                    </select>
                    <select id="ordenar-por" class="bg-[#1E1E1E] border border-[#1F7EDC] rounded-lg py-2.5 px-4 text-[#F2F2F2] focus:border-[#FF6A2A] outline-none">
                        <option value="dias_asc">Días (menor primero)</option>
                        <option value="dias_desc">Días (mayor primero)</option>
                        <option value="folio_asc">Folio A-Z</option>
                        <option value="folio_desc">Folio Z-A</option>
                    </select>
                    <button onclick="limpiarFiltros()" class="bg-[#1F7EDC] hover:bg-[#1a6ab8] text-white px-4 py-2.5 rounded-lg text-sm flex items-center gap-2">
                        <i class="fa-solid fa-eraser"></i> Limpiar
                    </button>
                </div>
                <div class="flex justify-end items-center mt-2 text-xs text-[#8A8F95]">
                    <span id="last-update"></span>
                    <span id="refreshing-indicator" class="ml-2 hidden"><i class="fa-solid fa-circle-notch fa-spin text-[#FF6A2A]"></i></span>
                </div>
            </div>

            <!-- Grid de equipos -->
            <div id="equipos-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="col-span-full text-center py-12">
                    <div class="spinner w-8 h-8 mx-auto mb-4"></div>
                    <p class="text-[#8A8F95]">Cargando equipos...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/70 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#2B2B2B] w-full max-w-3xl rounded-2xl border border-[#1F7EDC] max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="p-6 border-b border-[#1F7EDC] flex justify-between items-center sticky top-0 bg-[#2B2B2B] z-10">
                <h3 class="text-xl font-bold text-[#1F7EDC] flex items-center gap-2">
                    <i class="fa-solid fa-file-lines text-[#1F7EDC]"></i>
                    <span id="modal-folio">FOLIO</span>
                </h3>
                <button onclick="cerrarModal()" class="text-[#8A8F95] hover:text-[#FF6A2A]"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div class="p-6 space-y-5" id="modal-content"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-[#2B2B2B] text-[#F2F2F2] px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-y-20 opacity-0 z-50 border-l-4 border-[#FF6A2A]">
        <i class="fa-solid fa-circle-check text-green-500"></i>
        <span id="toast-message">Mensaje</span>
    </div>

    <script>
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        let PASSWORD = '';
        let equiposData = [];
        let equiposFiltrados = [];
        let intervalo = null;
        let filtros = {
            texto: '',
            color: 'todos',
            estado: 'todos',
            orden: 'dias_asc'
        };

        // Cargar preferencias guardadas
        (function() {
            const savedPass = sessionStorage.getItem('srfix_pass_tecnico');
            if (savedPass) document.getElementById('password-input').value = savedPass;
            const savedFiltros = localStorage.getItem('srfix_filtros_tecnico');
            if (savedFiltros) {
                try {
                    filtros = JSON.parse(savedFiltros);
                    document.getElementById('buscador').value = filtros.texto || '';
                    document.getElementById('filtro-color').value = filtros.color || 'todos';
                    document.getElementById('filtro-estado').value = filtros.estado || 'todos';
                    document.getElementById('ordenar-por').value = filtros.orden || 'dias_asc';
                } catch (e) {}
            }
        })();

        // ==========================================
        // LOGIN / LOGOUT
        // ==========================================
        async function login() {
            PASSWORD = document.getElementById('password-input').value.trim();
            if (!PASSWORD) return mostrarErrorLogin('Ingresa la contraseña');

            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner w-5 h-5"></div> Verificando...';
            ocultarErrorLogin();

            const ok = await cargarDatos(true);

            if (ok) {
                sessionStorage.setItem('srfix_pass_tecnico', PASSWORD);
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('fecha-actual').textContent = new Date().toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit', year: 'numeric' });
                if (intervalo) clearInterval(intervalo);
                intervalo = setInterval(cargarDatos, 30000);
            } else {
                mostrarErrorLogin('Contraseña incorrecta o error de conexión');
                btn.innerHTML = 'INGRESAR';
                btn.disabled = false;
            }
        }

        function logout() {
            if (intervalo) clearInterval(intervalo);
            sessionStorage.removeItem('srfix_pass_tecnico');
            location.reload();
        }

        function mostrarErrorLogin(msg) {
            const el = document.getElementById('login-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }
        function ocultarErrorLogin() {
            document.getElementById('login-error').classList.add('hidden');
        }

        // ==========================================
        // CARGA DE DATOS
        // ==========================================
        async function cargarDatos(esLogin = false) {
            mostrarRefreshing(true);
            try {
                const res = await fetch(CONFIG.BACKEND_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'semaforo',
                        modulo: CONFIG.MODULO,
                        password: PASSWORD
                    })
                });
                if (!res.ok) throw new Error('Error de conexión');
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                equiposData = data.equipos || [];
                document.getElementById('count-urgentes').textContent = data.urgentes || 0;
                document.getElementById('count-atencion').textContent = data.atencion || 0;
                document.getElementById('count-tiempo').textContent = data.aTiempo || 0;
                document.getElementById('count-total').textContent = equiposData.length;

                aplicarFiltrosYOrdenar();
                actualizarHoraActualizacion();
                mostrarToast('Datos actualizados', 'success');
                return true;
            } catch (e) {
                console.error('Error cargando datos:', e);
                if (!esLogin) {
                    mostrarToast('Error al actualizar', 'error');
                }
                return false;
            } finally {
                mostrarRefreshing(false);
            }
        }

        function refrescarManual() {
            cargarDatos();
        }

        function mostrarRefreshing(mostrar) {
            const el = document.getElementById('refreshing-indicator');
            if (mostrar) el.classList.remove('hidden');
            else el.classList.add('hidden');
        }

        function actualizarHoraActualizacion() {
            document.getElementById('last-update').innerHTML = `<i class="fa-regular fa-clock mr-1 text-[#1F7EDC]"></i> ${new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second:'2-digit' })}`;
        }

        // ==========================================
        // FILTROS Y ORDENAMIENTO
        // ==========================================
        function aplicarFiltrosYOrdenar() {
            filtros.texto = document.getElementById('buscador').value.trim().toLowerCase();
            filtros.color = document.getElementById('filtro-color').value;
            filtros.estado = document.getElementById('filtro-estado').value;
            filtros.orden = document.getElementById('ordenar-por').value;

            localStorage.setItem('srfix_filtros_tecnico', JSON.stringify(filtros));

            let resultado = equiposData.filter(eq => {
                if (filtros.color !== 'todos' && eq.color !== filtros.color) return false;
                if (filtros.estado !== 'todos' && eq.ESTADO !== filtros.estado) return false;
                if (filtros.texto) {
                    const texto = filtros.texto;
                    return (eq.FOLIO && eq.FOLIO.toLowerCase().includes(texto)) ||
                           (eq.CLIENTE_NOMBRE && eq.CLIENTE_NOMBRE.toLowerCase().includes(texto)) ||
                           (eq.DISPOSITIVO && eq.DISPOSITIVO.toLowerCase().includes(texto)) ||
                           (eq.MODELO && eq.MODELO.toLowerCase().includes(texto));
                }
                return true;
            });

            resultado.sort((a, b) => {
                switch (filtros.orden) {
                    case 'dias_asc': return a.diasRestantes - b.diasRestantes;
                    case 'dias_desc': return b.diasRestantes - a.diasRestantes;
                    case 'folio_asc': return (a.FOLIO || '').localeCompare(b.FOLIO || '');
                    case 'folio_desc': return (b.FOLIO || '').localeCompare(a.FOLIO || '');
                    default: return 0;
                }
            });

            equiposFiltrados = resultado;
            renderizar();
        }

        document.getElementById('buscador').addEventListener('input', aplicarFiltrosYOrdenar);
        document.getElementById('filtro-color').addEventListener('change', aplicarFiltrosYOrdenar);
        document.getElementById('filtro-estado').addEventListener('change', aplicarFiltrosYOrdenar);
        document.getElementById('ordenar-por').addEventListener('change', aplicarFiltrosYOrdenar);

        function limpiarFiltros() {
            document.getElementById('buscador').value = '';
            document.getElementById('filtro-color').value = 'todos';
            document.getElementById('filtro-estado').value = 'todos';
            document.getElementById('ordenar-por').value = 'dias_asc';
            aplicarFiltrosYOrdenar();
        }

        // ==========================================
        // RENDERIZADO DE TARJETAS
        // ==========================================
        function renderizar() {
            const grid = document.getElementById('equipos-grid');
            if (!equiposFiltrados.length) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-[#8A8F95]"><i class="fa-solid fa-folder-open text-4xl mb-4 opacity-30"></i><p>No hay equipos con esos filtros</p></div>';
                return;
            }

            grid.innerHTML = '';
            equiposFiltrados.forEach(eq => {
                const card = document.createElement('div');
                card.className = `card-${eq.color} rounded-xl p-5 cursor-pointer hover:scale-[1.02] transition-all`;
                card.onclick = () => abrirModal(eq);

                const dotClass = eq.color === 'rojo' ? 'bg-red-500 animate-pulse-red' : eq.color === 'amarillo' ? 'bg-yellow-500' : 'bg-green-500';
                const diasClase = eq.diasRestantes <= 2 ? 'text-red-500 font-bold' : eq.diasRestantes <= 4 ? 'text-yellow-500' : 'text-[#8A8F95]';

                let badgeClass = '';
                switch (eq.ESTADO) {
                    case 'Recibido': badgeClass = 'badge-recibido'; break;
                    case 'En Diagnóstico': badgeClass = 'badge-diagnostico'; break;
                    case 'En Reparación': badgeClass = 'badge-reparacion'; break;
                    case 'Esperando Refacción': badgeClass = 'badge-esperando'; break;
                    case 'Listo': badgeClass = 'badge-listo'; break;
                    case 'Entregado': badgeClass = 'badge-entregado'; break;
                    default: badgeClass = 'badge-recibido';
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full ${dotClass}"></div>
                            <span class="font-mono font-bold text-[#F2F2F2]">${escapeHtml(eq.FOLIO)}</span>
                        </div>
                        <span class="text-xs ${diasClase} bg-[#1E1E1E] px-2 py-1 rounded-full">${eq.diasRestantes} días</span>
                    </div>
                    <h3 class="font-semibold text-[#F2F2F2] mb-1 truncate" title="${escapeHtml(eq.CLIENTE_NOMBRE)}">${escapeHtml(eq.CLIENTE_NOMBRE)}</h3>
                    <p class="text-[#8A8F95] text-sm mb-2 truncate">${escapeHtml(eq.DISPOSITIVO)} ${escapeHtml(eq.MODELO || '')}</p>
                    <div class="flex flex-wrap gap-2 items-center justify-between mt-3">
                        <span class="badge-estado ${badgeClass} text-xs">${escapeHtml(eq.ESTADO)}</span>
                        <span class="text-xs text-[#1F7EDC] flex items-center gap-1"><i class="fa-regular fa-eye"></i> Ver detalles</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ==========================================
        // MODAL
        // ==========================================
        let equipoActual = null;

        function abrirModal(eq) {
            equipoActual = eq;
            document.getElementById('modal-folio').textContent = eq.FOLIO;
            const safeFolio = String(eq.FOLIO).replace(/[^a-zA-Z0-9_-]/g, '_');

            const contenido = `
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-[#8A8F95] uppercase">Cliente</label>
                        <p class="text-[#F2F2F2] font-medium">${escapeHtml(eq.CLIENTE_NOMBRE)}</p>
                    </div>
                    <div>
                        <label class="text-xs text-[#8A8F95] uppercase">Teléfono</label>
                        <p class="text-[#F2F2F2]">${escapeHtml(eq.CLIENTE_TELEFONO) || 'N/A'}</p>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-[#8A8F95] uppercase">Equipo</label>
                        <p class="text-[#F2F2F2]">${escapeHtml(eq.DISPOSITIVO)} ${escapeHtml(eq.MODELO || '')}</p>
                    </div>
                    <div>
                        <label class="text-xs text-[#8A8F95] uppercase">Fecha promesa</label>
                        <p class="text-[#F2F2F2] ${eq.diasRestantes <= 2 ? 'text-red-500 font-bold' : eq.diasRestantes <= 4 ? 'text-yellow-500' : ''}">
                            ${escapeHtml(eq.FECHA_PROMESA)} (${eq.diasRestantes} días)
                        </p>
                    </div>
                </div>

                <div>
                    <label class="text-xs text-[#8A8F95] uppercase">Falla reportada</label>
                    <p class="text-[#F2F2F2] bg-[#1E1E1E] p-3 rounded text-sm">${escapeHtml(eq.FALLA_REPORTADA) || 'Sin descripción'}</p>
                </div>

                <div>
                    <label class="text-xs text-[#8A8F95] uppercase">Estado</label>
                    <select id="modal-estado" class="w-full input-tech rounded-lg p-2.5 mt-1">
                        ${['Recibido','En Diagnóstico','En Reparación','Esperando Refacción','Listo','Entregado']
                            .map(e => `<option value="${e}" ${eq.ESTADO === e ? 'selected' : ''}>${e}</option>`).join('')}
                    </select>
                </div>

                <div>
                    <label class="text-xs text-[#8A8F95] uppercase">Técnico asignado</label>
                    <input type="text" id="modal-tecnico" value="${escapeHtml(eq.TECNICO_ASIGNADO || '')}" class="w-full input-tech rounded-lg p-2 mt-1" placeholder="Nombre del técnico">
                </div>

                <div>
                    <label class="text-xs text-[#8A8F95] uppercase">YouTube ID (Live Cam)</label>
                    <input type="text" id="modal-yt" value="${escapeHtml(eq.YOUTUBE_ID || '')}" class="w-full input-tech rounded-lg p-2 font-mono text-sm mt-1" placeholder="Ej: aqz-KE-BPKQ">
                    <p class="text-xs text-[#8A8F95] mt-1">https://youtube.com/watch?v=ID</p>
                </div>

                <div>
                    <label class="text-xs text-[#8A8F95] uppercase">Notas internas</label>
                    <textarea id="modal-notas" rows="3" class="w-full input-tech rounded-lg p-2 text-sm mt-1">${escapeHtml(eq.NOTAS_INTERNAS || '')}</textarea>
                </div>

                <div class="border-t border-[#1F7EDC] pt-4">
                    <label class="text-xs text-[#8A8F95] uppercase flex items-center gap-2"><i class="fa-regular fa-clock"></i> Últimos movimientos</label>
                    <div class="text-sm text-[#F2F2F2] bg-[#1E1E1E] p-3 rounded mt-1">
                        ${eq.NOTAS_INTERNAS ? '• ' + eq.NOTAS_INTERNAS.split('\n').filter(l=>l).join('<br>• ') : 'Sin historial de notas'}
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="guardarCambios()" class="flex-1 btn-naranja font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-save"></i> Guardar Cambios
                    </button>
                    <button onclick="if(confirm('¿Marcar como entregado? Se cerrará el equipo.')) { cambiarEstadoEntregado() }" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-check-double"></i> Entregar
                    </button>
                </div>
            `;

            document.getElementById('modal-content').innerHTML = contenido;
            document.getElementById('modal').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modal').classList.add('hidden');
            equipoActual = null;
        }

        async function guardarCambios() {
            const campos = {
                ESTADO: document.getElementById('modal-estado').value,
                TECNICO_ASIGNADO: document.getElementById('modal-tecnico').value,
                YOUTUBE_ID: document.getElementById('modal-yt').value,
                NOTAS_INTERNAS: document.getElementById('modal-notas').value
            };

            try {
                const res = await fetch(CONFIG.BACKEND_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'actualizar_equipo',
                        modulo: CONFIG.MODULO,
                        password: PASSWORD,
                        folio: equipoActual.FOLIO,
                        campos: campos
                    })
                });

                if (!res.ok) throw new Error('Error de conexión');
                const data = await res.json();

                if (data.success) {
                    mostrarToast('Cambios guardados', 'success');
                    cerrarModal();
                    await cargarDatos();
                } else {
                    throw new Error(data.error);
                }
            } catch (e) {
                mostrarToast('Error: ' + e.message, 'error');
            }
        }

        async function cambiarEstadoEntregado() {
            const campos = { ESTADO: 'Entregado' };
            try {
                const res = await fetch(CONFIG.BACKEND_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'actualizar_equipo',
                        modulo: CONFIG.MODULO,
                        password: PASSWORD,
                        folio: equipoActual.FOLIO,
                        campos: campos
                    })
                });
                if (!res.ok) throw new Error('Error de conexión');
                const data = await res.json();
                if (data.success) {
                    mostrarToast('Equipo marcado como entregado', 'success');
                    cerrarModal();
                    await cargarDatos();
                } else throw new Error(data.error);
            } catch (e) {
                mostrarToast('Error: ' + e.message, 'error');
            }
        }

        // ==========================================
        // UTILERÍAS
        // ==========================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function mostrarToast(mensaje, tipo = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = mensaje;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            toast.style.borderLeftColor = tipo === 'error' ? '#ef4444' : '#FF6A2A';
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') cerrarModal();
        });

        window.addEventListener('load', () => {
            if (sessionStorage.getItem('srfix_pass_tecnico')) {
                document.getElementById('password-input').value = sessionStorage.getItem('srfix_pass_tecnico');
                login();
            }
        });
    </script>
</body>
</html>
